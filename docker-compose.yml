services:

  # ---------------------------------------------------------------------------
  # OpenSearch single-node (security disabled for local dev)
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # OpenSearch Dashboards
  # ---------------------------------------------------------------------------
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # PostgreSQL (feedback + evaluation logs)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-rag_eval}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # FastAPI RAG application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      target: runtime
    env_file: .env
    environment:
      # Override hosts to use Docker service names
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-rag_eval}
    volumes:
      - ./app:/app/app          # hot-reload in dev
      - ./scripts:/app/scripts
      - ./docs_sample:/docs_sample
    ports:
      - "8000:8000"
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  # ---------------------------------------------------------------------------
  # React frontend (nginx serving built assets, proxies /api → app)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      target: runtime
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  opensearch_data:
  postgres_data:
